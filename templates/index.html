<!DOCTYPE html>
<html>
<head>
    <title>Interactive Colorizer</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #bda3da;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div {
            background: rgb(241, 225, 255);
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: #420272;
        }

        h2 {
            margin-bottom: 15px;
            color: #5a2d7d;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        button, input[type=file]{
            background: #bda3da;
            color: white;
            border: none;
            padding: 10px 18px;
            margin-top: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        #img {
            margin-top: 15px;
            border-radius: 10px;
            max-width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        input[type="color"] {
            margin-top: 10px;
            width: 60px;
            height: 40px;
            border: none;
            cursor: pointer;
        }

        </style>
</head>
<body>
<div>
<h2>Upload Image</h2>

<input type="file" id="file">
<br>
<button onclick="upload()">Colorize</button>

<br><br>

<img id="img" width="500" onclick="selectObject(event)">

<br><br>

<input type="color" id="colorPicker" value="#ff0000">
<br>
<button onclick="applyColor()">Apply Color</button>
</div>
<script>
let boxes = [];
let selectedId = null;
let imageId = null;

function upload() {
    let file = document.getElementById("file").files[0];
    let formData = new FormData();
    formData.append("image", file);

    fetch("/detect", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("img").src = data.image + "?t=" + new Date().getTime();
        boxes = data.boxes;
        imageId = data.image_id;
    });
}

function selectObject(e) {
    let img = document.getElementById("img");
    let rect = img.getBoundingClientRect();

    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    let scaleX = img.naturalWidth / img.width;
    let scaleY = img.naturalHeight / img.height;

    x *= scaleX;
    y *= scaleY;

    for (let b of boxes) {
        if (x >= b.x1 && x <= b.x2 && y >= b.y1 && y <= b.y2) {
            selectedId = b.id;
            alert("Selected object ID: " + selectedId);
            break;
        }
    }
}

function applyColor() {
    if (selectedId === null) {
        alert("Select object first");
        return;
    }

    let hex = document.getElementById("colorPicker").value;

    let r = parseInt(hex.substr(1,2),16);
    let g = parseInt(hex.substr(3,2),16);
    let b = parseInt(hex.substr(5,2),16);

    fetch("/color", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
        id: selectedId,
        color: [r,g,b],
        image_id: imageId
    })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("img").src = data.image + "?t=" + new Date().getTime();
    });
}
</script>

</body>
</html>
